<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Q&A</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📅 Daily Question</h1>

    <div class="card">
      <h2>Today's Question</h2>
      <p id="question">Loading...</p>
    </div>

    <div class="card">
      <h2>Yesterday's Answer</h2>
      <input type="email" id="email" placeholder="Enter your Gmail">
      <br><br>
      <button onclick="verifyAndOpen()">Show Answer</button>
      <p id="message"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
